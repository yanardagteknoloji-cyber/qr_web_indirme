<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yanardağ QR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 40px;
    }
    h1 span { color: #e8440a; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #e8440a;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 14px;
      box-shadow: 0 4px 30px rgba(232,68,10,0.45);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover  { opacity: 0.88; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <h1>Yanardağ <span>QR</span></h1>
  <a class="btn" href="Yanardag_qr.apk" download="Yanardag_qr.apk">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    İndir
  </a>
  <script>
    // Sayfa açılınca otomatik indir
    const a = document.createElement('a');
    a.href = 'Yanardag_qr.apk';
    a.download = 'Yanardag_qr.apk';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  </script>
</body>
</html>
